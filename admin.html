<!doctype html>
<html lang="es-MX">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Revisar pedidos | El Bambino Daniel</title>
  <link rel="stylesheet" href="style.css?v=2">
  <link rel="stylesheet" href="admin.css?v=2">
</head>
<body class="admin-body">
  <header class="admin-header">
    <a href="index.html" class="admin-brand">
      <img src="logo-el-bambino-daniel.png?v=2" alt="El Bambino Daniel">
      <div><strong>EL BAMBINO DANIEL</strong><span>Proveedor de farmacias, medicamentos y laboratorios</span></div>
    </a>
    <a class="btn btn-light" href="index.html">Regresar a la tienda</a>
  </header>

  <div class="version-ribbon">VERSIÓN 3 · ACCESO CORREGIDO</div><main class="admin-main">
    <section id="loginPanel" class="admin-login-card">
      <span class="eyebrow">Acceso restringido</span>
      <h1>Revisar pedidos</h1>
      <p>Ingrese la clave <strong>2222</strong> para consultar pedidos pendientes e históricos.</p>
      <form id="loginForm" autocomplete="off">
        <label>Clave de acceso <small style="display:block;font-weight:400;margin-top:5px">Escriba 2222</small>
          <input id="adminPin" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="4" required autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" name="clave-el-bambino">
        </label>
        <button id="directLoginButton" class="btn btn-primary btn-full" type="button">ENTRAR A PEDIDOS</button>
        <p id="loginError" class="admin-error" hidden>Clave incorrecta o servidor no disponible.</p>
      </form>
    </section>

    <section id="ordersPanel" class="orders-panel" hidden>
      <div class="orders-toolbar">
        <div>
          <span class="eyebrow">Administración</span>
          <h1>Pedidos</h1>
        </div>
        <button id="logoutButton" class="btn btn-light" type="button">Cerrar sesión</button>
      </div>

      <div class="orders-tabs">
        <button class="orders-tab active" data-status="pending" type="button">Pendientes <span id="pendingCount">0</span></button>
        <button class="orders-tab" data-status="attended" type="button">Histórico <span id="historyCount">0</span></button>
      </div>

      <div id="ordersMessage" class="admin-info" hidden></div>
      <div id="ordersList" class="orders-list"></div>
    </section>
  </main>

  <section id="orderModal" class="admin-modal" hidden>
    <div class="admin-modal-card">
      <button id="closeOrderModal" class="icon-button admin-modal-close" type="button">×</button>
      <div id="orderDetail"></div>
    </div>
  </section>

  <script src="config.js?v=2"></script>
  <script src="admin.js?v=2"></script>
</body>
</html>
