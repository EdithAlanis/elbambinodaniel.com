<!doctype html>
<html lang="es-MX">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Revisar pedidos | El Bambino Daniel</title>
  <link rel="stylesheet" href="../estilos-finales.css">
  <link rel="stylesheet" href="../panel-final.css">
</head>
<body class="admin-body">
<header class="admin-header">
  <a href="../index.html" class="admin-brand">
    <img src="../logo-el-bambino-daniel.png" alt="El Bambino Daniel">
    <div><strong>EL BAMBINO DANIEL</strong><span>Panel privado de pedidos</span></div>
  </a>
  <a class="btn btn-light" href="../index.html">Regresar a la tienda</a>
</header>
<main class="admin-main">
  <section id="loginPanel" class="admin-login-card">
    <span class="eyebrow">Acceso restringido</span>
    <h1>Revisar pedidos</h1>
    <p>Ingrese su clave privada.</p>
    <div class="pin-login">
      <div id="pinDisplay" class="pin-display">○○○○</div>
      <div class="pin-keypad">
        <button type="button" class="pin-key" data-digit="1">1</button>
        <button type="button" class="pin-key" data-digit="2">2</button>
        <button type="button" class="pin-key" data-digit="3">3</button>
        <button type="button" class="pin-key" data-digit="4">4</button>
        <button type="button" class="pin-key" data-digit="5">5</button>
        <button type="button" class="pin-key" data-digit="6">6</button>
        <button type="button" class="pin-key" data-digit="7">7</button>
        <button type="button" class="pin-key" data-digit="8">8</button>
        <button type="button" class="pin-key" data-digit="9">9</button>
        <button type="button" class="pin-key pin-clear" data-action="clear">Borrar</button>
        <button type="button" class="pin-key" data-digit="0">0</button>
        <button type="button" class="pin-key" data-action="back">⌫</button>
      </div>
      <button id="loginButton" class="btn btn-primary btn-full" type="button">ENTRAR</button>
      <p id="loginError" class="admin-error" hidden>Clave incorrecta o servidor no disponible.</p>
    </div>
  </section>

  <section id="ordersPanel" class="orders-panel" hidden>
    <div class="orders-toolbar">
      <div><span class="eyebrow">Administración</span><h1>Pedidos</h1></div>
      <button id="logoutButton" class="btn btn-light" type="button">Cerrar sesión</button>
    </div>
    <div class="orders-tabs">
      <button class="orders-tab active" data-status="pending">Pendientes <span id="pendingCount">0</span></button>
      <button class="orders-tab" data-status="attended">Histórico <span id="historyCount">0</span></button>
    </div>
    <div id="ordersMessage" class="admin-info" hidden></div>
    <div id="ordersList" class="orders-list"></div>
  </section>
</main>
<section id="orderModal" class="admin-modal" hidden>
  <div class="admin-modal-card">
    <button id="closeOrderModal" class="icon-button admin-modal-close" type="button">×</button>
    <div id="orderDetail"></div>
  </div>
</section>
<script src="../config-final.js"></script>
<script src="panel.js"></script>
</body>
</html>
