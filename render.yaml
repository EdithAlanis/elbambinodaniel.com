services:
  - type: web
    name: elbambinodaniel-pedidos
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: ADMIN_PASSWORD
        value: "2222"
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://elbambinodaniel.com,https://www.elbambinodaniel.com
      - key: DATABASE_URL
        fromDatabase:
          name: elbambinodaniel-db
          property: connectionString
      - key: ADMIN_WHATSAPP
        value: "523331191167"
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false

databases:
  - name: elbambinodaniel-db
    plan: free
    databaseName: elbambinodaniel
    user: elbambinodaniel
