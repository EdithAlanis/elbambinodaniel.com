<!doctype html>
<html lang="es-MX">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Revisar pedidos | El Bambino Daniel</title>
  <link rel="stylesheet" href="estilos-finales.css?f=20260716">
  <link rel="stylesheet" href="panel-final.css?f=20260716">
</head>
<body class="admin-body">
  <header class="admin-header">
    <a href="index.html?f=20260716" class="admin-brand">
      <img src="logo-el-bambino-daniel.png?f=20260716" alt="El Bambino Daniel">
      <div><strong>EL BAMBINO DANIEL</strong><span>Proveedor de farmacias, medicamentos y laboratorios</span></div>
    </a>
    <a class="btn btn-light" href="index.html?f=20260716">Regresar a la tienda</a>
  </header>

  <main class="admin-main">
    <section id="loginPanel" class="admin-login-card">
      <span class="eyebrow">Acceso restringido</span>
      <h1>Revisar pedidos</h1>
      <p>Acceso exclusivo para administración de pedidos.</p>
      
      <div id="loginForm" class="pin-login" aria-label="Acceso privado">
        <p class="pin-instruction">Toque los cuatro números de su clave privada.</p>
        <div id="pinDisplay" class="pin-display" aria-label="Clave capturada">••••</div>
        <div class="pin-keypad" aria-label="Teclado numérico">
          <button type="button" class="pin-key" data-digit="1">1</button>
          <button type="button" class="pin-key" data-digit="2">2</button>
          <button type="button" class="pin-key" data-digit="3">3</button>
          <button type="button" class="pin-key" data-digit="4">4</button>
          <button type="button" class="pin-key" data-digit="5">5</button>
          <button type="button" class="pin-key" data-digit="6">6</button>
          <button type="button" class="pin-key" data-digit="7">7</button>
          <button type="button" class="pin-key" data-digit="8">8</button>
          <button type="button" class="pin-key" data-digit="9">9</button>
          <button type="button" class="pin-key pin-clear" data-action="clear">Borrar</button>
          <button type="button" class="pin-key" data-digit="0">0</button>
          <button type="button" class="pin-key pin-back" data-action="back">⌫</button>
        </div>
        <button id="directLoginButton" class="btn btn-primary btn-full" type="button">ENTRAR</button>
        <p id="loginError" class="admin-error" hidden>Clave incorrecta.</p>
      </div>

    </section>

    <section id="ordersPanel" class="orders-panel" hidden>
      <div class="orders-toolbar">
        <div>
          <span class="eyebrow">Administración</span>
          <h1>Pedidos</h1>
        </div>
        <button id="logoutButton" class="btn btn-light" type="button">Cerrar sesión</button>
      </div>

      <div class="orders-tabs">
        <button class="orders-tab active" data-status="pending" type="button">Pendientes <span id="pendingCount">0</span></button>
        <button class="orders-tab" data-status="attended" type="button">Histórico <span id="historyCount">0</span></button>
      </div>

      <div id="ordersMessage" class="admin-info" hidden></div>
      <div id="ordersList" class="orders-list"></div>
    </section>
  </main>

  <section id="orderModal" class="admin-modal" hidden>
    <div class="admin-modal-card">
      <button id="closeOrderModal" class="icon-button admin-modal-close" type="button">×</button>
      <div id="orderDetail"></div>
    </div>
  </section>

  <script src="config-final.js?f=20260716"></script>
  <script src="panel-final.js?f=20260716"></script>
</body>
</html>
